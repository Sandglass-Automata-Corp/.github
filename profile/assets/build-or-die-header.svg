<svg width="1600" height="320" viewBox="0 0 1600 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BUILD OR DIE header</title>
  <desc id="desc">Blocky black text reading BUILD OR DIE on a white background.</desc>

  <defs>
